# netlify.toml — Staffona

[build]
  publish = "."
  functions = "netlify/functions"

# Enforce staffona.com (no-www) as canonical domain
[[redirects]]
  from = "https://www.staffona.com/*"
  to   = "https://staffona.com/:splat"
  status = 301
  force  = true

# Convenience redirects
[[redirects]]
  from = "/contact"
  to   = "/#contact"
  status = 301

[[redirects]]
  from = "/quote"
  to   = "/pricing"
  status = 301

[[redirects]]
  from = "/blog"
  to   = "/resources"
  status = 301

[[redirects]]
  from = "/jobs"
  to   = "/careers"
  status = 301

[[redirects]]
  from = "/hire"
  to   = "/hr-outsourcing"
  status = 301

[[redirects]]
  from = "/payroll"
  to   = "/payroll-egypt"
  status = 301

[[redirects]]
  from = "/recruitment"
  to   = "/recruitment-egypt"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache static assets (1 year)
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No cache for HTML pages (always fresh)
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Calculator clean URL
[[redirects]]
  from = "/payroll-calculator"
  to   = "/payroll-calculator.html"
  status = 200
